<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
</head>

<body>
    <div class="min-h-screen bg-[#000000] text-white">
        <header>
            <app-navbar />
        </header>
        <main class="max-w-7xl mx-auto py-10 px-10">
            <router-outlet></router-outlet>
            <app-scrolltop />

            <!-- Token Expired Modal -->
            @if (expireTokenModal == true){
            <div reveal class="fixed inset-0 bg-black/50 flex items-center justify-center z-20">
                <div class="bg-white login-card rounded-lg p-6 md:w-100 w-full mx-20 shadow-lg text-center">
                    <div class="mb-4 md:text-4xl text-3xl text-red-500 font-bold">✗</div>
                    <h2 class="font-bold md:text-xl text-base font-bold text-black mb-2">Account is Logout!
                    </h2>
                    <p class="text-gray-600 md:text-base text-sm font-medium mb-6">
                        Previous account is logout because its session is expired. Please login again.
                    </p>
                    <app-button label="Okay" (click)="closeExpireTokenModal()" />
                </div>
            </div>
            }
        </main>
        <footer>
            <app-footer />
        </footer>
    </div>
</body>

</html>
