<div class="relative w-full">
    <div class="absolute inset-0 rounded-3xl"></div>

    <form (ngSubmit)="search()" class="relative flex items-center w-full p-4 gap-0">
        <input type="text" [(ngModel)]="searchValue" name="search" [placeholder]="placeholder"
            class="search-card  flex-1 border-white bg-white rounded-l-3xl px-4 py-2 text-black focus:outline-none focus:ring-0 md:text-lg text-base" />
        <button type="submit"
            class="search-card  bg-white text-white px-4 py-2 rounded-r-3xl cursor-pointer md:text-lg text-base">
            🔍
        </button>
    </form>
</div>
