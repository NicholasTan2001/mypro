<div class="flex flex-col gap-1">

    @if (label) {
    <label class="md:text-base text-sm text-gray-400 font-medium">
        {{ label }}
    </label>
    }

    <input [type]="type" [placeholder]="placeholder" [value]="model" (input)="onInput($event)"
        [attr.inputmode]="inputmode" [attr.maxlength]="maxlength"
        class="border border-gray-500 rounded-lg p-2 w-full text-black md:text-base text-sm font-medium focus:outline-none focus:ring-1 focus:ring-purple-500 focus:border-white" />

</div>
