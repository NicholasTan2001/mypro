<div class="flex flex-col gap-1">
    @if (label) {
    <label class="md:text-sm text-xs text-gray-400 font-medium">{{ label }}</label>
    }
    <input [type]="type" [placeholder]="placeholder" [attr.inputmode]="inputmode || null"
        [attr.pattern]="pattern || null" [attr.min]="min || null" [attr.maxlength]="maxlength || null" [value]="value"
        (input)="onInput($event)" (blur)="onTouched()" class="border border-gray-500 rounded-lg p-2 md:text-base text-sm font-medium
           focus:border-white focus:outline-none focus:ring-2 focus:ring-purple-300 
           transition duration-300 bg-transparent text-black">
</div>
