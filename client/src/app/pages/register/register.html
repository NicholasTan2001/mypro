<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
</head>

<body>

    <div class=" flex flex-col items-center justify-center">

        <h1 reveal class="font-bold md:text-2xl text-xl mb-8">Register <span class="text-purple-600">My</span>Profile
        </h1>

        <div reveal class="login-card flex flex-col bg-white rounded-lg p-6 md:w-120 w-full">

            <h2 class="text-center font-bold md:text-xl text-base text-purple-600">Register Now</h2>

            <form class="flex flex-col gap-4 p-4">

                <app-input label="Identity Number" type="text" placeholder="010118145248" inputmode="numeric"
                    pattern="[0-9]*" maxlength="12" />

                <app-input label="Full Name" type="text" placeholder="John Doe" />

                <app-input label="Age" type="number" min="1" placeholder="25" />

                <app-input label="Password" type="password" placeholder="Qwer1234." />

                <app-input label="Confirm Password" type="password" placeholder="Qwer1234." />

                <div class="flex md:flex-row flex-col md:gap-5 gap-6 md:justify-between items-end">
                    <div class="flex flex-col w-full gap-1 md:w-3/4 font-medium">
                        <label class="md:text-sm text-xs text-gray-400 font-medium">Country</label>
                        <select class="border border-gray-600 text-white rounded-lg p-2 md:text-base text-sm cursor-pointer
                      focus:border-white focus:ring-2 focus:ring-purple-500/50 transition duration-300 w-full">
                            <option value="malaysia">🇲🇾 Malaysia</option>
                            <option value="coming-soon" disabled class="text-gray-500 font-medium">Coming
                                Soon ...
                            </option>
                        </select>
                    </div>

                    <app-button type="submit" label="Register" class="flex flex-col w-full md:w-1/4" />
                </div>

                <app-button label="Back to Login" routerLink="/login" class="flex flex-col mt-5 w-full" />

            </form>

        </div>

    </div>

</body>

</html>
