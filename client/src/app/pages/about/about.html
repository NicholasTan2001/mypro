<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Page</title>
</head>

<body>

    <!-- About Us Content -->
    <div class=" flex flex-col text-center px-4 md:px-0">
        <h1 reveal class="font-bold md:text-2xl text-xl mb-12">{{ 'about.about' |
            translate }}<span class="text-purple-600">{{ 'nav.my' |
                translate }}</span>{{ 'nav.profile' |
            translate }}
        </h1>
        <div reveal>
            <img reveal src="Image_3.jpg" alt="Image 3 Logo" class="md:w-150 w-80 mx-auto mb-12 image-animation">
        </div>
        <p reveal class="font-medium md:text-base text-sm leading-relaxed text-justify mb-12 ">{{ 'about.description' |
            translate }}</p>
        <div reveal>
            <img reveal src="Image_4.jpg" alt="Image 4 Logo" class="md:w-150 w-80 mx-auto image-animation">
        </div>
    </div>
</body>

</html>
